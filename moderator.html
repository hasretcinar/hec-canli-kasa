<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderatör - Demode TV Canlı Kasa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>

<div class="app">
  <main class="panel main-panel">
    <header class="header">
      <div class="logo">🎛️ Moderatör Paneli</div>
      <div class="status">
        <span>Oda: <strong id="hRoom">-</strong></span>
        <span>Durum: <strong id="hPhase">-</strong></span>
        <span>Soru: <strong id="hRound">-</strong></span>
        <span>Süre: <strong id="timerText">-</strong></span>
      </div>
    </header>

    <section class="content center" id="createArea">
      <h1>Oda Oluştur</h1>
      <p>Bu ekran moderatör için. Oda kur, oyuncu linkini paylaş, yayın ekranını OBS’ye ver.</p>
      <div class="grid-2">
        <div class="card">
          <label>Soru süresi / saniye</label>
          <input id="durationInput" type="number" value="45" min="10" max="180">
        </div>
        <div class="card">
          <label>Mevcut oda kodu ile bağlan</label>
          <input id="existingRoomInput" placeholder="Örn: AB123">
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="createNewRoom()">Yeni Oda Oluştur</button>
        <button class="btn secondary" onclick="joinExistingRoom()">Odaya Bağlan</button>
      </div>
    </section>

    <section class="content hidden" id="modArea">
      <div class="card">
        <h2>Oda Kodun: <span class="money" id="roomCodeText">-</span></h2>
        <p class="muted">Oyuncular linkten girer. Yayın ekranında kim neye kaç para yatırdı görünmez.</p>
        <div class="grid-2">
          <div>
            <label>Oyuncu linki</label>
            <input id="playerLink" readonly>
          </div>
          <div>
            <label>Yayın ekranı linki</label>
            <input id="displayLink" readonly>
          </div>
        </div>
        <div class="actions">
          <button class="btn secondary" onclick="copyText(byId('playerLink').value)">Oyuncu Linkini Kopyala</button>
          <button class="btn secondary" onclick="copyText(byId('displayLink').value)">Yayın Linkini Kopyala</button>
          <button class="btn secondary" onclick="window.open(byId('displayLink').value,'_blank')">Yayın Ekranını Aç</button>
        </div>
      </div>

      <div id="questionArea"></div>
      <div id="resultsBox"></div>

      <div class="card">
        <h3>Oyun Kontrolleri</h3>
        <div class="actions">
          <button class="btn primary" onclick="doStartGame()">Oyunu Başlat</button>
          <button class="btn success" onclick="doReveal()">Cevabı Aç</button>
          <button class="btn primary" onclick="doNext()">Sonraki Soru</button>
          <button class="btn danger" onclick="doReset()">Sıfırla</button>
        </div>
      </div>
    </section>
  </main>

  <aside class="side-panel">
    <section class="side-card">
      <div class="side-title">Canlı Sıralama</div>
      <div class="side-body players" id="playersBox"></div>
    </section>
  </aside>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="game.js"></script>
<script>
let roomCode = qs("room") || null;
let state = null;
let activeRef = null;

function showModArea(code){
  byId("createArea").classList.add("hidden");
  byId("modArea").classList.remove("hidden");
  byId("roomCodeText").textContent = code;
  const links = makeRoomLinks(code);
  byId("playerLink").value = links.player;
  byId("displayLink").value = links.display;
  history.replaceState(null, "", `moderator.html?room=${code}`);
}

function listenRoom(code){
  if(activeRef) activeRef.off();
  activeRef = roomRef(code);
  activeRef.on("value", snap=>{
    state = snap.val();
    if(!state) return;
    renderHeader(state);
    renderQuestion(state);
    renderPlayers(state);
    renderResults(state);
  });
}

async function createNewRoom(){
  try{
    const duration = Number(byId("durationInput").value) || 45;
    roomCode = await createRoom(duration);
    showModArea(roomCode);
    listenRoom(roomCode);
  }catch(e){ alert(e.message); }
}

function joinExistingRoom(){
  const code = (byId("existingRoomInput").value || prompt("Oda kodu gir:") || "").toUpperCase().trim();
  if(!code) return;
  roomCode = code;
  showModArea(roomCode);
  listenRoom(roomCode);
}

async function doStartGame(){
  try{ await startGame(roomCode, Number(byId("durationInput").value) || 45); }
  catch(e){ alert(e.message); }
}

async function doReveal(){
  try{ await revealAnswer(roomCode); }
  catch(e){ alert(e.message); }
}

async function doNext(){
  try{ await nextQuestion(roomCode); }
  catch(e){ alert(e.message); }
}

async function doReset(){
  if(!confirm("Odayı sıfırlamak istiyor musun?")) return;
  try{ await resetRoom(roomCode); }
  catch(e){ alert(e.message); }
}

startLocalTick(()=>{ if(state){ renderTimer(state); } });

if(roomCode){
  showModArea(roomCode);
  listenRoom(roomCode);
}
</script>
</body>
</html>
