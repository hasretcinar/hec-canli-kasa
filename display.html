<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yayın Ekranı - Demode TV Canlı Kasa</title>
  <link rel="stylesheet" href="style.css?v=23">
</head>
<body class="display-page">
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>

<div class="app display-app">
  <main class="panel main-panel display-main">
    <header class="header">
      <div class="logo">💸 Demode TV Canlı Kasa</div>
      <div class="center-timer" aria-label="Süre göstergesi">⏱ <span>Kalan Süre</span> <strong id="timerText">-</strong></div>
      <div class="status">
        <span>Oda: <strong id="hRoom">-</strong></span>
        <span>Durum: <strong id="hPhase">-</strong></span>
        <span>Soru: <strong id="hRound">-</strong></span>
      </div>
    </header>
    <section class="content display-content">
      <div id="questionArea"></div>
      <div id="resultsBox"></div>
    </section>
  </main>

  <aside class="side-panel display-ranking">
    <section class="side-card">
      <div class="side-title">Canlı Sıralama</div>
      <div class="side-body players" id="playersBox"></div>
    </section>
  </aside>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js?v=23"></script>
<script src="game.js?v=23"></script>
<script>
let roomCode = qs("room") || prompt("Yayın ekranı için oda kodu:");
let state = null;
let activeRef = null;

function listenRoom(code){
  if(activeRef) activeRef.off();
  activeRef = roomRef(code);
  activeRef.on("value", snap=>{
    state = snap.val();
    if(!state) return;
    renderHeader(state);
    renderQuestion(state);
    renderPlayers(state);
    renderResults(state);
  });
}

startLocalTick(()=>{ if(state){ renderTimer(state); } });

if(roomCode){
  roomCode = roomCode.toUpperCase();
  listenRoom(roomCode);
}
</script>
</body>
</html>
