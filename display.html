<script>
let roomCode = qs("room") || prompt("Yayın ekranı için oda kodu:");
let state = null;
let activeRef = null;

function listenRoom(code){
  activeRef = roomRef(code);
  activeRef.on("value", snap=>{
    state = snap.val();
    if(!state) return;
    renderHeader(state);
    renderQuestion(state);
    renderPlayers(state);
    renderResults(state);
  });
}

startLocalTick(()=>{ if(state){ renderTimer(state); } });

if(roomCode){
  roomCode = roomCode.toUpperCase();
  listenRoom(roomCode);
}
</script>
