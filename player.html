<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyuncu - Demode TV Canlı Kasa</title>
  <link rel="stylesheet" href="style.css?v=25y1">
</head>
<body class="player-page">
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>

<div class="app single">
  <main class="panel main-panel">
    <header class="header">
      <div class="logo">📱 Oyuncu Ekranı</div>
      <div class="center-timer" aria-label="Süre göstergesi">⏱ <span>Kalan Süre</span> <strong id="timerText">-</strong></div>
      <div class="status">
        <span>Oda: <strong id="hRoom">-</strong></span>
        <span>Durum: <strong id="hPhase">-</strong></span>
      </div>
    </header>

    <section class="content center" id="joinArea">
      <h1>Odaya Katıl</h1>
      <p>İsmini yaz, odaya gir. Para dağıtımını kilitledikten sonra değiştiremezsin.</p>
      <div class="grid-2">
        <div class="card">
          <label>Oda kodu</label>
          <input id="roomInput" placeholder="Örn: AB123">
        </div>
        <div class="card">
          <label>Adın</label>
          <input id="nameInput" placeholder="Adını yaz">
        </div>
      </div>

      <div class="card avatar-select-card">
        <label>Fotoğrafını seç</label>
        <div class="avatar-picker" id="avatarPicker"></div>
      </div>

      <button class="btn primary" onclick="doJoin()">Odaya Katıl</button>
    </section>

    <section class="content hidden player-content" id="playArea">
      <div class="player-top-card">
        <div class="me-head">
          <div class="me-avatar" id="meAvatar"></div>
          <div>
            <div class="small">Yarışmacı</div>
            <h2 id="meName">Oyuncu</h2>
          </div>
        </div>
        <div>
          <div class="small">Benim kasam</div>
          <div class="money player-cash" id="meCash">0 TL</div>
        </div>
        <div>
          <div class="small">Durum</div>
          <p class="muted" id="lockInfo">Para yatırma bekleniyor.</p>
        </div>
      </div>

      <div id="questionArea"></div>

      <div class="card compact-betbar" id="betCard">
        <div>
          <div class="small">Dağıtılan</div>
          <strong id="betTotal" class="money">0 TL</strong>
          <span id="betStatus" class="burned">Eksik</span>
        </div>
        <div class="compact-actions">
          <button class="btn secondary quick" onclick="splitEven()">Eşit Böl</button>
          <button class="btn danger quick" onclick="clearBet()">Temizle</button>
          <button id="lockBtn" class="btn primary" onclick="doLock()" disabled>Gizli Kilitle</button>
        </div>
      </div>

      <div id="resultsBox"></div>
    </section>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js?v=25y1"></script>
<script src="game.js?v=25y1"></script>
<script>
let roomCode = qs("room") || "";
let playerId = null;
let state = null;
let activeRef = null;
let selectedAvatar = "mehmet";

byId("roomInput").value = roomCode;
renderAvatarPicker();

function currentOptionCount(){
  const q = publicQuestionForRender(state);
  return Math.max(1, Math.min(4, Number(q?.options?.length || 4)));
}

function me(){
  return state?.players?.[playerId] ? { id:playerId, ...state.players[playerId] } : null;
}


function renderPlayerQuestion(){
  const area = byId("questionArea");
  if(!area || !state) return;

  if(state.phase === "lobby"){
    area.innerHTML = `
      <div class="card waiting-card">
        <div class="badge">Lobi</div>
        <h2>Oyun başlatılması bekleniyor</h2>
        <p class="muted">Moderatör oyunu başlatınca soru ve para dağıtım alanı burada açılacak.</p>
      </div>
    `;
    return;
  }

  if(state.phase === "final"){
    renderQuestion(state);
    return;
  }

  const q = publicQuestionForRender(state);
  if(!q){
    renderQuestion(state);
    return;
  }

  const p = me();
  const showCorrect = state.phase === "revealed";
  const correctIndex = correctIndexForQuestion(q);
  const disabled = !p || !isBettingOpen(state) || p.locked || p.eliminated || Number(p.cash || 0) <= 0;

  let media = "";
  if(q.image) media += `<div class="media compact-media"><img src="${q.image}" alt="Görselli soru"></div>`;
  if(q.audio) media += `<div class="media compact-media"><p class="muted">Sesli soru</p><audio controls preload="auto" src="${q.audio}"></audio></div>`;
  if(q.video) media += `<div class="media compact-media"><video controls src="${q.video}"></video></div>`;

  const opts = q.options.map((opt,i)=>{
    const oldValue = (Array.isArray(p?.allocation) ? p.allocation[i] : byId(`a${i}`)?.value) || 0;
    const isCorrect = showCorrect && i === correctIndex;
    const cls = showCorrect ? (isCorrect ? " correct" : " wrong") : "";
    const resultTag = showCorrect ? `<div class="option-result-tag ${isCorrect ? "tag-correct" : "tag-wrong"}">${isCorrect ? "KASA KALDI" : "YANDI"}</div>` : "";
    const revealAmount = showCorrect ? `<div class="player-reveal-inline"><span>${isCorrect ? "Kalan kasa" : "Bu şık"}</span><strong>${money(Number(oldValue || 0))}</strong></div>` : "";
    const moneyVisual = showCorrect ? "" : `
        <div class="player-money-visual">
          <div class="money-stack" id="stack${i}"></div>
          <div class="stack-label" id="stackLabel${i}">0 TL</div>
        </div>`;
    const inputRow = showCorrect ? "" : `
        <div class="bet-input-row">
          <input id="a${i}" type="number" min="0" step="10000" value="${oldValue}" oninput="updateBetTotal()" ${disabled ? "disabled" : ""}>
          <button class="btn secondary quick mini-all" onclick="putAll(${i})" ${disabled ? "disabled" : ""}>Hepsi</button>
        </div>`;
    return `
      <div class="option bet-option${cls}${showCorrect ? " reveal-compact" : ""}" style="--reveal-delay:${(i * 0.08).toFixed(2)}s">
        <div class="bet-option-main">
          <span class="letter">${letters[i]}</span>
          <strong>${escapeHtml(opt)}</strong>
        </div>
        ${resultTag}
        ${revealAmount}
        ${moneyVisual}
        ${inputRow}
      </div>
    `;
  }).join("");

  const revealBanner = showCorrect ? `<div class="answer-reveal-banner"><span class="answer-reveal-kicker">✅ Doğru cevap</span><strong>${letters[correctIndex]} • ${escapeHtml(q.options[correctIndex])}</strong></div>` : "";

  area.innerHTML = `
    <div class="card question-card player-question-card ${showCorrect ? "reveal-stage" : ""}">
      <div class="player-question-head">
        <div>
          <div class="badge">Soru ${q.index+1} / ${q.total}</div>
          <p class="muted" style="margin-top:8px">Kategori: ${q.category}</p>
        </div>
        <div class="badge">${state.phase === "betting" ? "Para yatırma" : "Cevap açıklandı"}</div>
      </div>
      ${media}
      <h2>${q.question}</h2>
      ${revealBanner}
      <div class="options player-options option-count-${q.options.length}">${opts}</div>
    </div>
  `;
  if(!showCorrect) updateBetTotal();
}



function renderAvatarPicker(){
  const box = byId("avatarPicker");
  if(!box) return;

  box.innerHTML = avatarOptions.map((avatar, index)=>`
    <button type="button" class="avatar-choice ${index === 0 ? "selected" : ""}" data-avatar="${avatar.id}" onclick="selectAvatar('${avatar.id}')">
      <img src="${avatar.src}" alt="${escapeHtml(avatar.name)}">
      <span>${escapeHtml(avatar.name)}</span>
    </button>
  `).join("");

  selectedAvatar = avatarOptions[0]?.id || "";
}

function selectAvatar(id){
  selectedAvatar = id;
  document.querySelectorAll(".avatar-choice").forEach(btn=>{
    btn.classList.toggle("selected", btn.dataset.avatar === id);
  });
}

async function doJoin(){
  try{
    roomCode = byId("roomInput").value.trim().toUpperCase();
    const name = byId("nameInput").value.trim();
    playerId = await joinPlayer(roomCode, name, selectedAvatar);
    byId("joinArea").classList.add("hidden");
    byId("playArea").classList.remove("hidden");
    listenRoom();
  }catch(e){ alert(e.message); }
}

function listenRoom(){
  if(activeRef) activeRef.off();
  activeRef = roomRef(roomCode);
  activeRef.on("value", snap=>{
    state = snap.val();
    if(!state) return;
    renderHeader(state);
    renderPlayerQuestion();
    renderResults(state);
    renderMe();
  });
}

function renderMe(){
  const p = me();
  if(!p) return;
  byId("meName").textContent = p.name;
  byId("meCash").textContent = money(p.cash || 0);

  const av = avatarById(p.avatar || "");
  const avatarBox = byId("meAvatar");
  if(avatarBox){
    avatarBox.innerHTML = av
      ? `<img src="${av.src}" alt="${escapeHtml(p.name || av.name)}">`
      : `<span>${escapeHtml(String(p.name || "?").slice(0,1).toUpperCase())}</span>`;
  }

  const disabled = !isBettingOpen(state) || p.locked || p.eliminated || Number(p.cash || 0) <= 0;
  for(let i=0;i<currentOptionCount();i++){
    const el = byId(`a${i}`);
    if(el) el.disabled = disabled;
  }
  document.querySelectorAll(".quick").forEach(btn=>btn.disabled = disabled);

  const shouldHideBetCard = state.phase !== "betting" || p.eliminated || Number(p.cash || 0) <= 0;
  byId("betCard").classList.toggle("hidden", shouldHideBetCard);

  if(p.eliminated || Number(p.cash || 0) <= 0){
    byId("lockInfo").textContent = "Elendin. Tabloda kalıyorsun ama para yatıramazsın.";
  }else if(state.phase === "betting"){
    byId("lockInfo").textContent = p.locked ? "Bu soru için kilitledin. Artık değişmez." : "Para dağıtımı açık. Gizli kilitle.";
  }else if(state.phase === "revealed"){
    byId("lockInfo").textContent = "Cevap açıklandı. Sonraki soru bekleniyor.";
  }else if(state.phase === "final"){
    byId("lockInfo").textContent = "Oyun bitti. Final ekranı gösteriliyor.";
  }else{
    byId("lockInfo").textContent = "Oyun bekleniyor.";
  }

  if(state.phase === "betting") updateBetTotal();
}

function getBet(){
  return Array.from({length: currentOptionCount()}, (_,i)=>{
    const el = byId(`a${i}`);
    return Math.max(0, Math.floor(Number(el?.value) || 0));
  });
}

function setBet(arr){
  const count = currentOptionCount();
  for(let i=0;i<count;i++){
    const el = byId(`a${i}`);
    if(el) el.value = Math.max(0, Math.round(Number(arr[i] || 0)));
  }
  updateBetTotal();
}


function updateMoneyStacks(){
  const p = me();
  if(!p) return;
  const cash = Math.max(1, Number(p.cash || 0));
  const values = getBet();
  values.forEach((value, i)=>{
    const stack = byId(`stack${i}`);
    const label = byId(`stackLabel${i}`);
    if(!stack || !label) return;
    label.textContent = money(value);
    const ratio = Math.max(0, Math.min(1, value / cash));
    const noteCount = value <= 0 ? 0 : Math.max(1, Math.min(10, Math.ceil(ratio * 10)));
    stack.innerHTML = "";
    for(let n=0;n<noteCount;n++){
      const note = document.createElement("span");
      note.style.setProperty("--n", n);
      stack.appendChild(note);
    }
    stack.style.setProperty("--stack-height", `${Math.round(10 + ratio * 48)}px`);
  });
}

function updateBetTotal(){
  const p = me();
  if(!p) return;
  const total = getBet().reduce((a,b)=>a+b,0);
  byId("betTotal").textContent = money(total);
  const status = byId("betStatus");
  if(total === Number(p.cash || 0)){
    status.textContent = "Tamam";
    status.className = "kept";
  }else if(total > Number(p.cash || 0)){
    status.textContent = `${money(total - Number(p.cash || 0))} fazla`;
    status.className = "burned";
  }else{
    status.textContent = `${money(Number(p.cash || 0) - total)} eksik`;
    status.className = "burned";
  }
  const lockBtn = byId("lockBtn");
  if(lockBtn) lockBtn.disabled = !isBettingOpen(state) || p.locked || p.eliminated || total !== Number(p.cash || 0);
  updateMoneyStacks();
}

function putAll(i){
  const p = me();
  if(!p) return;
  const arr = Array(currentOptionCount()).fill(0);
  arr[i] = Number(p.cash || 0);
  setBet(arr);
}

function splitEven(){
  const p = me();
  if(!p) return;
  const cash = Number(p.cash || 0);
  const count = currentOptionCount();
  const base = Math.floor(cash / count / 10000) * 10000;
  const arr = Array(count).fill(base);
  arr[0] += cash - arr.reduce((a,b)=>a+b,0);
  setBet(arr);
}

function clearBet(){ setBet(Array(currentOptionCount()).fill(0)); }

async function doLock(){
  if(!isBettingOpen(state)){ alert("Süre bitti. Para kilitleyemezsin."); return; }
  try{
    await lockPlayerBet(roomCode, playerId, getBet());
  }catch(e){ alert(e.message); }
}

startLocalTick(()=>{ if(state){ renderTimer(state); if(playerId) renderMe(); } });
</script>
</body>
</html>
